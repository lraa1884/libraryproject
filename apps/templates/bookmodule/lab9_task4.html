<!DOCTYPE html>
<html>
<head>
    <title>Task 4</title>
</head>
<body>

<h1>Book Price Statistics</h1>

<table border="1">

<tr>
    <th>Publisher</th>
    <th>Average</th>
    <th>Minimum</th>
    <th>Maximum</th>
</tr>

{% for p in publishers %}

<tr>
    <td>{{ p.name }}</td>
    <td>{{ p.avg_price }}</td>
    <td>{{ p.min_price }}</td>
    <td>{{ p.max_price }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
