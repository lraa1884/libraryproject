{% extends 'layouts/base.html' %}
{% block content %}
<h1>Task 7 - Number of Students per City</h1>
<table border="1" cellpadding="8">
  <tr>
    <th>City</th>
    <th>Number of Students</th>
  </tr>
  {% for city in cities %}
  <tr>
    <td>{{ city.city }}</td>
    <td>{{ city.student_count }}</td>
  </tr>
  {% empty %}
  <tr>
    <td colspan="2">No data found.</td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
