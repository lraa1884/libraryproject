{% extends "layouts/base.html" %}

{% block title %} Book List {% endblock title %}

{% block content %}
<h2>Search Results</h2>

{% if books %}
    <ul>
    {% for book in books %}
        <li>
            <strong>{{ book.title }}</strong> by {{ book.author }}
        </li>
    {% endfor %}
    </ul>
{% else %}
    <p>No books found.</p>
{% endif %}

{% endblock content %}
