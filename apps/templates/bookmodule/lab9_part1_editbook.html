<!DOCTYPE html>
<html>
<head>
    <title>Edit Book</title>
</head>
<body>
<h1>Edit Book</h1>
<form method="POST">
    {% csrf_token %}
    <label>Title:</label>
    <input type="text" name="title" value="{{ book.title }}">
    <br><br>
    <label>Author:</label>
    <input type="text" name="author" value="{{ book.author }}">
    <br><br>
    <label>Price:</label>
    <input type="number" step="0.1" name="price" value="{{ book.price }}">
    <br><br>
    <label>Edition:</label>
    <input type="number" name="edition" value="{{ book.edition }}">
    <br><br>
    <button type="submit">
        Update Book
    </button>
</form>
</body>
</html>
