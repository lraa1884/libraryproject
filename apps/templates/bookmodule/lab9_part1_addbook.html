<!DOCTYPE html>
<html>
<head>
    <title>Add Book</title>
</head>
<body>
<h1>Add New Book</h1>
<form method="POST">
    {% csrf_token %}
    <label>Title:</label>
    <input type="text" name="title">
    <br><br>
    <label>Author:</label>
    <input type="text" name="author">
    <br><br>
    <label>Price:</label>
    <input type="number" step="0.1" name="price">
    <br><br>
    <label>Edition:</label>
    <input type="number" name="edition">
    <br><br>
    <button type="submit">
        Add Book
    </button>
</form>
</body>
</html>
